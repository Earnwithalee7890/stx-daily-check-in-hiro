name: Clarity CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Download Clarinet
      run: |
        curl -L https://github.com/hirosystems/clarinet/releases/download/v2.10.0/clarinet-linux-x64-glibc.tar.gz | tar xz
        sudo mv clarinet /usr/local/bin/

    - name: Check Clarity Contracts
      run: clarinet check

    - name: Run Clarity Tests
      run: npm run test
