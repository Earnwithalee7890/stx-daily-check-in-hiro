name: Check Contracts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Clarinet
      run: |
        wget https://github.com/stx-labs/clarinet/releases/download/v3.15.1/clarinet-linux-x64-glibc.tar.gz
        tar -xzf clarinet-linux-x64-glibc.tar.gz
        sudo mv clarinet /usr/local/bin/

    
    - name: Check all contracts
      run: clarinet check
    
    - name: Run tests
      run: clarinet test
